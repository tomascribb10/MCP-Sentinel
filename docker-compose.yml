---
# MCP-Sentinel — Docker Compose development stack
#
# Services:
#   infrastructure:   rabbitmq, postgres
#   sentinel core:    conductor, scheduler, mcp-api, admin-api
#
# Agents run in SEPARATE compose files so their identity is stable:
#   docker-compose.agent-test.yml  — containerised test agent (fixed name)
#   docker-compose.agent-host.yml  — agent that targets the real host OS
#
# Usage:
#   docker compose up -d rabbitmq postgres   # infra only
#   docker compose up -d                     # full control plane
#   docker compose logs -f conductor
#
# Default credentials (DEV ONLY — change in production):
#   RabbitMQ:   sentinel / sentinel  →  http://localhost:15672
#   PostgreSQL: sentinel / sentinel  →  localhost:5432/sentinel
#   Admin API:  http://localhost:8001
#   MCP API:    http://localhost:8000

# Anchoring the project name ensures that docker-compose.agent-*.yml
# can reliably reference external networks and volumes by name.
name: sentinel

version: "3.9"

# -----------------------------------------------------------------------
# Shared network
# -----------------------------------------------------------------------
networks:
  sentinel-net:
    driver: bridge

# -----------------------------------------------------------------------
# Persistent volumes
# -----------------------------------------------------------------------
volumes:
  postgres-data:
  rabbitmq-data:
  sentinel-keys:     # RSA keys shared between conductor and agents

# -----------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------
services:

  # ---------------------------------------------------------------------
  # Infrastructure: RabbitMQ
  # ---------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sentinel-rabbitmq
    restart: unless-stopped
    networks: [sentinel-net]
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: sentinel
      RABBITMQ_DEFAULT_PASS: sentinel
      RABBITMQ_DEFAULT_VHOST: sentinel
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------
  # Infrastructure: PostgreSQL
  # ---------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    networks: [sentinel-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------
  # Key generator (one-shot): generates RSA keys on first run
  # ---------------------------------------------------------------------
  keygen:
    build:
      context: ./sentinel
      dockerfile: ../docker/Dockerfile.base
    container_name: sentinel-keygen
    user: root          # needs write access to the sentinel-keys volume
    networks: [sentinel-net]
    volumes:
      - sentinel-keys:/etc/sentinel
    # Use list form + sh heredoc so Python indentation is preserved.
    # YAML '>' folds newlines to spaces (breaks Python); '|' preserves them.
    command:
      - sh
      - -c
      - |
        python3 <<'PYEOF'
        from cryptography.hazmat.primitives.asymmetric import rsa
        from cryptography.hazmat.primitives import serialization
        import pathlib
        key_dir = pathlib.Path('/etc/sentinel')
        key_dir.mkdir(exist_ok=True)
        priv_path = key_dir / 'conductor_private.pem'
        pub_path  = key_dir / 'conductor_public.pem'
        if not priv_path.exists():
            key = rsa.generate_private_key(public_exponent=65537, key_size=4096)
            priv_path.write_bytes(key.private_bytes(
                serialization.Encoding.PEM,
                serialization.PrivateFormat.TraditionalOpenSSL,
                serialization.NoEncryption()
            ))
            pub_path.write_bytes(key.public_key().public_bytes(
                serialization.Encoding.PEM,
                serialization.PublicFormat.SubjectPublicKeyInfo
            ))
            print('RSA 4096 key pair generated.')
        else:
            print('Keys already exist, skipping generation.')
        PYEOF
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------
  # DB migrations (one-shot): runs Alembic upgrade head
  # ---------------------------------------------------------------------
  migrate:
    build:
      context: ./sentinel
      dockerfile: ../docker/Dockerfile.base
    container_name: sentinel-migrate
    networks: [sentinel-net]
    environment:
      SENTINEL_CONF: /etc/sentinel/sentinel.conf
    volumes:
      - sentinel-keys:/etc/sentinel
      - ./config/sentinel.dev.conf:/etc/sentinel/sentinel.conf:ro
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
      keygen:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------
  # sentinel-conductor
  # ---------------------------------------------------------------------
  conductor:
    build:
      context: ./sentinel
      dockerfile: ../docker/Dockerfile.base
    container_name: sentinel-conductor
    restart: unless-stopped
    networks: [sentinel-net]
    environment:
      SENTINEL_CONF: /etc/sentinel/sentinel.conf
      # Bootstrap: creates 'admin' superuser on first run if users table is empty.
      # Change this password before deploying anywhere real.
      SENTINEL_INITIAL_ADMIN_PASSWORD: "sentinel-admin-dev"
      SENTINEL_INITIAL_ADMIN_USER: "admin"
      SENTINEL_SEED_DEFAULTS: "true"
    volumes:
      - sentinel-keys:/etc/sentinel
      - ./config/sentinel.dev.conf:/etc/sentinel/sentinel.conf:ro
    command: sentinel-conductor
    depends_on:
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f sentinel-conductor || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------
  # sentinel-scheduler
  # ---------------------------------------------------------------------
  scheduler:
    build:
      context: ./sentinel
      dockerfile: ../docker/Dockerfile.base
    container_name: sentinel-scheduler
    restart: unless-stopped
    networks: [sentinel-net]
    environment:
      SENTINEL_CONF: /etc/sentinel/sentinel.conf
    volumes:
      - sentinel-keys:/etc/sentinel
      - ./config/sentinel.dev.conf:/etc/sentinel/sentinel.conf:ro
    command: sentinel-scheduler
    depends_on:
      conductor:
        condition: service_healthy

  # ---------------------------------------------------------------------
  # sentinel-mcp-api  (port 8000)
  # ---------------------------------------------------------------------
  mcp-api:
    build:
      context: ./sentinel
      dockerfile: ../docker/Dockerfile.base
    container_name: sentinel-mcp-api
    restart: unless-stopped
    networks: [sentinel-net]
    ports:
      - "8000:8000"
    environment:
      SENTINEL_CONF: /etc/sentinel/sentinel.conf
    volumes:
      - sentinel-keys:/etc/sentinel
      - ./config/sentinel.dev.conf:/etc/sentinel/sentinel.conf:ro
    command: sentinel-mcp-api
    depends_on:
      conductor:
        condition: service_healthy

  # ---------------------------------------------------------------------
  # sentinel-admin-api  (port 8001)
  # ---------------------------------------------------------------------
  admin-api:
    build:
      context: ./sentinel
      dockerfile: ../docker/Dockerfile.base
    container_name: sentinel-admin-api
    restart: unless-stopped
    networks: [sentinel-net]
    ports:
      - "8001:8001"
    environment:
      SENTINEL_CONF: /etc/sentinel/sentinel.conf
    volumes:
      - sentinel-keys:/etc/sentinel
      - ./config/sentinel.dev.conf:/etc/sentinel/sentinel.conf:ro
    command: sentinel-admin-api
    depends_on:
      conductor:
        condition: service_healthy

